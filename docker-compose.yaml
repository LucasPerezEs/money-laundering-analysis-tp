services:
  client_0:
    build:
      context: ./src/client
      dockerfile: Dockerfile
    container_name: client_0
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - ACCOUNTS_INPUT_FILE=datasets/test/test_accounts.csv
    - TRANSACTIONS_INPUT_FILE=datasets/test/test_transactions.csv
    - OUTPUT_FILE=queries_results.csv
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - OUTPUT_QUEUE=raw_data_queue
    - INPUT_QUEUE_1=results_1
    - INPUT_QUEUE_2=results_2
    - INPUT_QUEUE_3=results_3
    - INPUT_QUEUE_4=results_4
    - INPUT_QUEUE_5=results_5
  q1_data_reducer_0:
    build:
      context: ./src
      dockerfile: data_reducer/Dockerfile
    container_name: q1_data_reducer_0
    environment:
    - RABBITMQ_HOST=rabbitmq
    - N_UPSTREAM=1
    - INPUT_EXCHANGE=usd_transactions_exc
    - N_UPSTREAM=1
    - SHARD_ID=0
    - OUTPUT_QUEUE=q1_reduced_data
    - KEEP_COLUMNS=From Bank,Account,To Bank,Account.1,Amount Paid
  q1_filter_lt_50_usd_0:
    build:
      context: ./src/
      dockerfile: filter/Dockerfile
    container_name: q1_filter_lt_50_usd_0
    environment:
    - RABBITMQ_HOST=rabbitmq
    - N_UPSTREAM=1
    - INPUT_QUEUE=q1_reduced_data
    - OUTPUT_QUEUE=results_1
    - FILTER_FIELD=Amount Paid
    - FILTER_OP=50
    - FILTER_VALUE=lt
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  usd_filter_0:
    build:
      context: ./src/
      dockerfile: filter/Dockerfile
    container_name: usd_filter_0
    environment:
    - RABBITMQ_HOST=rabbitmq
    - N_UPSTREAM=1
    - INPUT_QUEUE=cleanded_data_queue
    - OUTPUT_EXCHANGE=usd_transactions_exc
    - FILTER_FIELD=Payment Currency
    - FILTER_OP=eq
    - FILTER_VALUE=US Dollar
