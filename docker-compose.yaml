services:
  client_0:
    build:
      context: ./src
      dockerfile: client/Dockerfile
    container_name: client_0
    depends_on:
      gateway:
        condition: service_started
    environment:
    - MOM_HOST=rabbitmq
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=7659
    - BATCH_SIZE=500
    - TRANSACTIONS_FILE=/datasets/LI-Small_Trans.csv
    - ACCOUNTS_FILE=/datasets/LI-Small_accounts.csv
    - CLIENT_ID=0
    - RESULTS_DIR=/results
    volumes:
    - ./datasets:/datasets
    - ./results:/results
  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
